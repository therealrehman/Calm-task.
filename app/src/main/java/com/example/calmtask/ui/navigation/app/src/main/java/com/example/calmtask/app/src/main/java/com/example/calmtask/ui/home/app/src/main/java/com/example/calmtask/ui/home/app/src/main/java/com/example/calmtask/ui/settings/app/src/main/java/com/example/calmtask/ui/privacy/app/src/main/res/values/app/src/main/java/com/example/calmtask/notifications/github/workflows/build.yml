name: Build CalmTask APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:    # allows manual run from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Make gradlew executable
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 4. Cache Gradle packages
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 6. Upload APK as downloadable artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalmTask-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. (Optional) Build release AAB for Play Store
      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: CalmTask-Release-Bundle
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
